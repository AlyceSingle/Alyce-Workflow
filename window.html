<div id="alyce_workspace" class="alyce" tabindex="-1">
    <div class="alyce__shell">
        <div class="alyce__hero">
            <div class="alyce__heroCopy">
                <div class="alyce__eyebrow">多阶段工作台</div>
                <h2 class="alyce__title">复用当前连接的多阶段生成</h2>
                <p class="alyce__subtitle">
                    勾选启用 Alyce 后，直接在当前聊天楼层发送消息即可接管本轮生成。线性模式展示固定链路，代理模式展示实时事件与继续入口。
                </p>
            </div>
        </div>

        <div id="alyce_connection_bar" class="alyce__connectionBar"></div>

        <div class="alyce__toolbar">
            <label class="alyce__toggle alyce__toggle--strong">
                <input id="alyce_enabled" type="checkbox">
                <span>启用 Alyce</span>
            </label>
            <div class="alyce__modeTabs">
                <button class="menu_button alyce__modeTab" data-mode="linear" title="线性模式">线性</button>
                <button class="menu_button alyce__modeTab" data-mode="agent" title="代理模式">代理</button>
            </div>
        </div>

        <div id="alyce_status_banner" class="alyce__statusBanner"></div>

        <div id="alyce_linear_view" class="alyce__view">
            <section class="alyce__panel alyce__panel--rail">
                <div class="alyce__panelHeader">
                    <h3>工作流轨道</h3>
                    <p>方块节点表示这一次的隐藏执行链。你可以在加号位置插入自定义环节，也可以关闭单个模块或删除自定义节点。</p>
                </div>
                <div id="alyce_linear_rail" class="alyce__rail"></div>
            </section>
            <div class="alyce__linearGrid">
                <section class="alyce__panel">
                    <div class="alyce__panelHeader alyce__panelHeader--left">
                        <h3>环节编辑器</h3>
                        <p>编辑当前选中环节的提示词与启用状态。整改轮数改为在整改模块内单独设置，最终输出仍只会回到聊天楼层。</p>
                    </div>
                    <div id="alyce_linear_editor" class="alyce__editor"></div>
                </section>
            </div>
        </div>

        <div id="alyce_agent_view" class="alyce__view alyce__view--hidden">
            <div class="alyce__agentGrid">
                <section class="alyce__panel alyce__panel--agentMain">
                    <div class="alyce__panelHeader alyce__panelHeader--left">
                        <h3>代理事件流</h3>
                        <p>参考本地 AlyceAgent 的终端信息架构，实时展示事件、状态与继续入口。最终回复会直接写回聊天，而不是停留在工作台。</p>
                    </div>
                    <div id="alyce_agent_stream" class="alyce__agentStream"></div>
                    <div class="alyce__composer">
                        <label class="alyce__composerLabel" for="alyce_agent_input">补充指令 / 继续</label>
                        <textarea id="alyce_agent_input" data-macros-autocomplete="hide" rows="4"></textarea>
                        <div class="alyce__composerActions">
                            <button id="alyce_agent_send" class="menu_button">发送补充</button>
                            <button id="alyce_agent_continue" class="menu_button">继续</button>
                        </div>
                    </div>
                </section>

                <section class="alyce__panel alyce__panel--agentSide">
                    <div class="alyce__panelHeader alyce__panelHeader--left">
                        <h3>代理侧栏</h3>
                        <p>状态栏、任务清单，以及当前最新工作内容。</p>
                    </div>
                    <div id="alyce_status_bar" class="alyce__statusBar"></div>
                    <div id="alyce_agent_todos" class="alyce__todoPanel"></div>
                    <div id="alyce_agent_details" class="alyce__detailsPanel"></div>
                </section>
            </div>
        </div>
    </div>
</div>
